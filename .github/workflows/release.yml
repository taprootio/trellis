name: Release

# Publishes @taprootio/trellis to the public npm registry on a v* tag.
#
# Auth is a two-phase plan (TRL0010):
#   Phase 1 (now): a short-lived npm automation token in the NPM_TOKEN secret.
#   Phase 2 (next): npm trusted publishing (OIDC). This job already requests
#     `id-token: write` and publishes with `--provenance`, so migrating is just:
#     configure the trusted publisher for this package + workflow on npmjs, then
#     delete the NPM_TOKEN secret — no workflow change required.
#
# Provenance requires this repository to be public.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance / trusted publishing

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Gates — never publish a red tree.
      - run: node --test
      - run: node scripts/backlog-readme.mjs --check
      # Publish only from a v<version> tag whose version matches package.json —
      # enforced on every trigger, so a manual workflow_dispatch from a branch
      # can't publish an untagged version.
      - name: Require a matching v<version> tag
        run: |
          if [ "$GITHUB_REF_TYPE" != "tag" ]; then
            echo "Release publishes only from a v<version> tag; got $GITHUB_REF_TYPE '$GITHUB_REF_NAME'." >&2
            echo "Tag the release, e.g. git tag v$(node -p "require('./package.json').version") && git push --tags" >&2
            exit 1
          fi
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "tag $GITHUB_REF_NAME ($tag) does not match package.json version $pkg" >&2
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
